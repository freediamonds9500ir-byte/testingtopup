<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi - NamaStore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <h1 class="logo">Konfirmasi<span>Pesanan</span></h1>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-body">
                <div class="summary-list">
                    <div class="summary-item"><span>ID Player</span><span id="res-id">-</span></div>
                    <div class="summary-item"><span>Item</span><span id="res-item">-</span></div>
                    <div class="summary-item"><span>Metode</span><span id="res-method">-</span></div>
                    <div class="summary-item"><span>Total</span><span id="res-total" class="total-pay">-</span></div>
                </div>
            </div>
        </div>

        <div class="card" id="qr-container" style="display: none;">
            <div class="card-body" style="text-align:center; background:#fff; border-radius:20px;">
                <img src="" id="qr-img" style="width:200px;">
                <p style="color:#000; font-size:12px;">Scan untuk membayar</p>
            </div>
        </div>

        <button class="btn-submit" id="btn-confirm">Bayar Sekarang</button>
    </main>

    <script src="form.js"></script>
</body>
</html>
